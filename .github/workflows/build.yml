name: Build Abyss.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # This is the magic fix: forces a safe folder name
        path: 'abyss_repo'

    - name: Configure CMake
      # We now point to the abyss_repo folder we created above
      run: cmake -S abyss_repo -B build_dir -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build_dir --config Release

    - name: Package Artifacts
      shell: bash
      run: |
        mkdir -p release
        cp build_dir/Release/*.exe release/ 2>/dev/null || cp build_dir/*.exe release/
        # Check assets folder or root for the image
        cp abyss_repo/assets/void.jpg release/ 2>/dev/null || cp abyss_repo/void.jpg release/
        find build_dir -name "*.dll" -exec cp {} release/ \;

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: Abyss-Windows-Build
        path: release/
