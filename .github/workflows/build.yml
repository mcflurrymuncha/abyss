name: Build Abyss.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      # Use a safe folder name like 'build_dir' instead of the default workspace
      run: cmake -B build_dir -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build_dir --config Release

    - name: Package Artifacts
      shell: bash
      run: |
        mkdir -p release
        # Use a wildcard to find the exe in case the dot causes pathing issues
        cp build_dir/Release/*.exe release/ 2>/dev/null || cp build_dir/*.exe release/
        cp assets/void.jpg release/ || cp void.jpg release/
        find build_dir -name "*.dll" -exec cp {} release/ \;

    - name: Upload Build
      # This makes the zip file available for download on GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Abyss-Windows-Build
        path: release/
