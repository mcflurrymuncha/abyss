name: Build Abyss.

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure CMake
      # Since the repo name is safe now, we can use standard paths
      run: cmake -B build_dir -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build_dir --config Release

    - name: Package Artifacts
      shell: bash
      run: |
        mkdir -p release
        # Copy the exe (it will be named Abyss..exe because of the CMake settings)
        cp build_dir/Release/*.exe release/ 2>/dev/null || cp build_dir/*.exe release/
        
        # Copy the image (checks assets folder first, then root)
        if [ -f "assets/void.jpg" ]; then
          cp assets/void.jpg release/
        elif [ -f "void.jpg" ]; then
          cp void.jpg release/
        fi
        
        # Gather all necessary DLLs (SFML and Discord)
        find build_dir -name "*.dll" -exec cp {} release/ \;

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: Abyss-Windows-Build
        path: release/
